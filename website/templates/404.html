{% extends "base.html" %}

{% block content %}
<!-- Error hero clearly tells visitors the requested page was not found. -->
<section class="page-hero compact">
    <div>
        <h1>404 Page Not Found</h1>
        <p>The page you are looking for does not exist or has been moved.</p>
    </div>
</section>

<main class="content-band">
    <!-- Recovery action sends users back to the event list. -->
    <section class="surface p-4 text-center">
        <h2 class="h4">Return to the event list</h2>
        <p class="text-muted">Use the home page to search for current festival events.</p>
        <a href="{{ url_for('main.index') }}" class="btn btn-primary">Back to Home</a>
    </section>
</main>
{% endblock %}
