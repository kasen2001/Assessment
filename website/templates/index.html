{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">Music Festival Events</h1>

    <div class="row">
        {% for event in events %}
        <div class="col-md-4 mb-4">
            <div class="card h-100">
                <img src="{{ url_for('static', filename='image/' + event.image) }}" class="card-img-top" alt="{{ event.title }}">

                <div class="card-body">
                    <h5 class="card-title">{{ event.title }}</h5>
                    <p class="card-text">{{ event.description[:100] }}...</p>

                    <p><strong>Genre:</strong> {{ event.genre }}</p>
                    <p><strong>City:</strong> {{ event.city }}</p>
                    <p><strong>Date:</strong> {{ event.date }}</p>
                    <p><strong>Status:</strong> {{ event.status }}</p>

                    <a href="{{ url_for('main.event_detail', event_id=event.id) }}" class="btn btn-primary">
                        View Details
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
