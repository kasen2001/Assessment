<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Tickets | TicketHub</title>
    <style>
        /* Base page reset and shared typography */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: #172033;
            background: #f5f7fb;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .site-header {
            background: #ffffff;
            border-bottom: 1px solid #dde3ee;
        }

        /* Simple booking page navigation */
        .nav {
            width: min(980px, calc(100% - 32px));
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.25rem;
            font-weight: 800;
        }

        .logo-mark {
            display: grid;
            place-items: center;
            width: 38px;
            height: 38px;
            color: #ffffff;
            background: #0f766e;
            border-radius: 8px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0 18px;
            color: #ffffff;
            background: #d9480f;
            border: 0;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
        }

        .button:hover {
            background: #bf3e0c;
        }

        .button-secondary {
            color: #172033;
            background: #ffffff;
            border: 1px solid #cdd6e2;
        }

        .button-secondary:hover {
            background: #f8fafc;
        }

        main {
            width: min(980px, calc(100% - 32px));
            margin: 48px auto 72px;
        }

        .page-title {
            margin-bottom: 24px;
        }

        .page-title p {
            margin-top: 10px;
            color: #64748b;
            line-height: 1.6;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            line-height: 1;
            letter-spacing: 0;
        }

        /* Two-column booking form with a visual summary panel */
        .booking-panel {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 24px;
            padding: 24px;
            background: #ffffff;
            border: 1px solid #dde3ee;
            border-radius: 8px;
            box-shadow: 0 18px 50px rgba(23, 32, 51, 0.08);
        }

        form {
            display: grid;
            gap: 16px;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        label {
            color: #526173;
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        input,
        select {
            width: 100%;
            height: 46px;
            padding: 0 12px;
            color: #172033;
            background: #f8fafc;
            border: 1px solid #cdd6e2;
            border-radius: 8px;
            font: inherit;
        }

        .summary {
            padding: 22px;
            color: #ffffff;
            background:
                linear-gradient(180deg, rgba(15, 118, 110, 0.88), rgba(23, 32, 51, 0.9)),
                url("https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=900&q=80") center/cover;
            border-radius: 8px;
        }

        .summary h2 {
            margin-bottom: 12px;
            font-size: 1.5rem;
        }

        .summary p {
            color: #e5eef7;
            line-height: 1.65;
        }

        .price {
            margin-top: 28px;
            font-size: 2.2rem;
            font-weight: 800;
        }

        /* Stack the booking form on smaller screens */
        @media (max-width: 760px) {
            .nav,
            .booking-panel {
                grid-template-columns: 1fr;
            }

            .nav {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Header keeps a quick path back to the homepage -->
    <header class="site-header">
        <nav class="nav" aria-label="Booking navigation">
            <a class="logo" href="index.html">
                <span class="logo-mark">T</span>
                <span>TicketHub</span>
            </a>
            <a class="button button-secondary" href="index.html">Home</a>
        </nav>
    </header>

    <main>
        <!-- Page title explains the booking task -->
        <section class="page-title">
            <h1>Book Your Ticket</h1>
            <p>Select an event, choose ticket quantity, and enter your details to reserve your place.</p>
        </section>

        <!-- Ticket reservation form and booking summary -->
        <section class="booking-panel">
            <form>
                <div class="field">
                    <label for="event">Event</label>
                    <select id="event" name="event">
                        <option>Neon Nights Live Concert</option>
                        <option>Championship Final Match</option>
                        <option>Broadway Evening Show</option>
                        <option>Summer Field Festival</option>
                        <option>Acoustic Sessions</option>
                        <option>City Lights DJ Night</option>
                    </select>
                </div>

                <div class="field">
                    <label for="ticket-type">Ticket Type</label>
                    <select id="ticket-type" name="ticket-type">
                        <option>Standard</option>
                        <option>Premium</option>
                        <option>VIP</option>
                    </select>
                </div>

                <div class="field">
                    <label for="quantity">Quantity</label>
                    <input id="quantity" name="quantity" type="number" min="1" max="10" value="1">
                </div>

                <div class="field">
                    <label for="name">Full Name</label>
                    <input id="name" name="name" type="text" placeholder="Enter your name">
                </div>

                <div class="field">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="you@example.com">
                </div>

                <button class="button" type="submit">Reserve Ticket</button>
            </form>

            <aside class="summary">
                <h2>Booking Summary</h2>
                <p>Your reservation will be prepared for the selected event. Final payment and seat selection can be added next.</p>
                <div class="price">From $49</div>
            </aside>
        </section>
    </main>
</body>
</html>
